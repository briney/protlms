# protlms model registry — maps model names/aliases to GHCR Docker image references.
#
# Images are published to GHCR; digests are pinned by .github/workflows/publish-image.yaml.
models:
  - name: esm2-8m
    aliases: [esm2_t6_8M]
    image: ghcr.io/briney/protlms-esm:t6_8M
    model_family: esm2
    build:
      context: containers/esm
      args: { ESM_HF_ID: facebook/esm2_t6_8M_UR50D, ESM_MODEL_NAME: esm2_t6_8M, ESM_MODEL_FAMILY: esm2 }
  - name: esm2-650m

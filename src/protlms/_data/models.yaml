# protlms model registry — maps model names/aliases to GHCR Docker image references.
#
# Images are published to GHCR; digests are pinned by .github/workflows/publish-image.yaml.
models:
  - name: esm2-8m
    aliases: [esm2_t6_8M]
    image: ghcr.io/briney/protlms-esm:t6_8M
    model_family: esm2
    build:
      context: containers/esm
      args: { ESM_HF_ID: facebook/esm2_t6_8M_UR50D, ESM_MODEL_NAME: esm2_t6_8M, ESM_MODEL_FAMILY: esm2 }
  - name: esm2-650m
    aliases: [esm2_t33_650M]
    image: ghcr.io/briney/protlms-esm:t33_650M
    model_family: esm2
    build:
      context: containers/esm
      args: { ESM_HF_ID: facebook/esm2_t33_650M_UR50D, ESM_MODEL_NAME: esm2_t33_650M, ESM_MODEL_FAMILY: esm2 }
  - name: progen2-small
    aliases: [progen2_small]
    image: ghcr.io/briney/protlms-progen2:small
    model_family: progen2
    build:
      context: containers/progen2
      args: { PROGEN2_CHECKPOINT: progen2-small }
  - name: esm-c-300m
    aliases: [esmc_300m]
    image: ghcr.io/briney/protlms-esm-c:300m
    model_family: esm-c
    build:
      context: containers/esm-c
      args: { ESMC_CHECKPOINT: esmc_300m }
  - name: esm-c-600m
    aliases: [esmc_600m]
    image: ghcr.io/briney/protlms-esm-c:600m
    model_family: esm-c
    build:
      context: containers/esm-c
      args: { ESMC_CHECKPOINT: esmc_600m }
  - name: protbert
    aliases: [prot_bert]
    image: ghcr.io/briney/protlms-protbert:uniref100
    model_family: protbert
    build:
      context: containers/protbert
      args: { PROTBERT_CHECKPOINT: prot_bert }
  - name: protbert-bfd
    aliases: [prot_bert_bfd]
    image: ghcr.io/briney/protlms-protbert:bfd
    model_family: protbert
    build:
      context: containers/protbert
      args: { PROTBERT_CHECKPOINT: prot_bert_bfd }
  - name: e1-150m
    aliases: [E1-150m]
    image: ghcr.io/briney/protlms-e1:150m
    model_family: e1
    build:
      context: containers/e1
      args: { E1_CHECKPOINT: E1-150m }
  - name: e1-300m
    aliases: [E1-300m]
    image: ghcr.io/briney/protlms-e1:300m
    model_family: e1
    build:
      context: containers/e1
      args: { E1_CHECKPOINT: E1-300m }
  - name: e1-600m
    aliases: [E1-600m]
    image: ghcr.io/briney/protlms-e1:600m
    model_family: e1
    build:
      context: containers/e1
      args: { E1_CHECKPOINT: E1-600m }
